<svg width="1800" height="1160" viewBox="0 0 1800 1160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9EF"/>
      <stop offset="1" stop-color="#FFF4E1"/>
    </linearGradient>
    <linearGradient id="sarvam" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB13B"/>
      <stop offset="1" stop-color="#E59400"/>
    </linearGradient>
    <linearGradient id="system" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F6F1E7"/>
      <stop offset="1" stop-color="#EFE3D1"/>
    </linearGradient>
    <linearGradient id="output" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DDF8EE"/>
      <stop offset="1" stop-color="#C7F0DF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#CCAA6A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#8A6E42"/>
    </marker>
    <style>
      .title { font: 700 42px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2E2415; }
      .subtitle { font: 500 21px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #68563A; }
      .section { font: 700 20px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #58462B; letter-spacing: 0.08em; }
      .box-title-dark { font: 700 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFDF9; }
      .box-title { font: 700 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2E2415; }
      .box-copy { font: 500 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5A4A30; }
      .box-copy-dark { font: 500 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFF7EA; }
      .small { font: 600 17px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6D5A3B; }
      .example-title { font: 700 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2E2415; }
      .example-copy { font: 500 20px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4E402A; }
    </style>
  </defs>

  <rect width="1800" height="1160" rx="28" fill="url(#bg)"/>

  <rect x="36" y="28" width="1728" height="1104" rx="30" stroke="#E8D5B4" stroke-width="2"/>

  <text x="70" y="90" class="title">Samjhao End-to-End Pipeline</text>
  <text x="70" y="126" class="subtitle">A high-level product workflow showing where each Sarvam model fits. Retrieval stays collapsed into one stage here so the full path is easier to read.</text>

  <g transform="translate(70 158)">
    <rect width="124" height="38" rx="19" fill="#FFE8BA" stroke="#F2BF61"/>
    <text x="62" y="25" text-anchor="middle" class="small">Sarvam step</text>
    <rect x="146" width="124" height="38" rx="19" fill="#F5EDE0" stroke="#DEC7A0"/>
    <text x="208" y="25" text-anchor="middle" class="small">App step</text>
    <rect x="292" width="150" height="38" rx="19" fill="#DFF6EA" stroke="#8ED8B7"/>
    <text x="367" y="25" text-anchor="middle" class="small">User-facing output</text>
  </g>

  <text x="70" y="260" class="section">INPUTS</text>
  <text x="70" y="480" class="section">DOCUMENT PATH</text>
  <text x="70" y="700" class="section">QUESTION PATH</text>
  <text x="70" y="920" class="section">FINAL EXPERIENCE</text>

  <g filter="url(#shadow)">
    <rect x="70" y="288" width="230" height="112" rx="24" fill="url(#system)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="185" y="334" text-anchor="middle" class="box-title">PDF Upload</text>
    <text x="185" y="366" text-anchor="middle" class="box-copy">Learner adds a study PDF</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="432" width="230" height="112" rx="24" fill="url(#system)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="185" y="478" text-anchor="middle" class="box-title">Typed Question</text>
    <text x="185" y="510" text-anchor="middle" class="box-copy">Hindi, Hinglish, or English</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="576" width="230" height="112" rx="24" fill="url(#system)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="185" y="622" text-anchor="middle" class="box-title">Voice Question</text>
    <text x="185" y="654" text-anchor="middle" class="box-copy">Student speaks naturally</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="468" width="270" height="128" rx="26" fill="url(#sarvam)" stroke="#D18600" stroke-width="2"/>
    <text x="515" y="515" text-anchor="middle" class="box-title-dark">Sarvam Vision</text>
    <text x="515" y="546" text-anchor="middle" class="box-copy-dark">Extracts markdown from the PDF</text>
    <text x="515" y="576" text-anchor="middle" class="box-copy-dark">and handles OCR-heavy content</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="735" y="468" width="270" height="128" rx="26" fill="url(#system)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="870" y="515" text-anchor="middle" class="box-title">Clean + Section</text>
    <text x="870" y="546" text-anchor="middle" class="box-copy">Remove repeated noise,</text>
    <text x="870" y="576" text-anchor="middle" class="box-copy">derive sections and chunks</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1090" y="468" width="270" height="128" rx="26" fill="url(#sarvam)" stroke="#D18600" stroke-width="2"/>
    <text x="1225" y="515" text-anchor="middle" class="box-title-dark">Sarvam-30B</text>
    <text x="1225" y="546" text-anchor="middle" class="box-copy-dark">Adds chunk context so retrieval</text>
    <text x="1225" y="576" text-anchor="middle" class="box-copy-dark">works on richer notebook text</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1445" y="468" width="285" height="128" rx="26" fill="url(#system)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="1587.5" y="515" text-anchor="middle" class="box-title">Store Notebook</text>
    <text x="1587.5" y="546" text-anchor="middle" class="box-copy">Save documents, chunks,</text>
    <text x="1587.5" y="576" text-anchor="middle" class="box-copy">embeddings, and chat state</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="720" width="270" height="128" rx="26" fill="url(#sarvam)" stroke="#D18600" stroke-width="2"/>
    <text x="515" y="767" text-anchor="middle" class="box-title-dark">Saaras v3</text>
    <text x="515" y="798" text-anchor="middle" class="box-copy-dark">Transcribes code-mixed audio</text>
    <text x="515" y="828" text-anchor="middle" class="box-copy-dark">into a usable transcript</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="735" y="720" width="270" height="128" rx="26" fill="url(#system)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="870" y="767" text-anchor="middle" class="box-title">Question + Profile</text>
    <text x="870" y="798" text-anchor="middle" class="box-copy">Question is paired with source,</text>
    <text x="870" y="828" text-anchor="middle" class="box-copy">language, and learner context</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1090" y="720" width="270" height="128" rx="26" fill="url(#sarvam)" stroke="#D18600" stroke-width="2"/>
    <text x="1225" y="767" text-anchor="middle" class="box-title-dark">Sarvam-30B</text>
    <text x="1225" y="798" text-anchor="middle" class="box-copy-dark">Builds search-friendly query</text>
    <text x="1225" y="828" text-anchor="middle" class="box-copy-dark">variants before retrieval</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1445" y="720" width="285" height="128" rx="26" fill="url(#system)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="1587.5" y="767" text-anchor="middle" class="box-title">Hybrid Retrieval</text>
    <text x="1587.5" y="798" text-anchor="middle" class="box-copy">Find the best grounded chunks</text>
    <text x="1587.5" y="828" text-anchor="middle" class="box-copy">from the stored notebook</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="940" width="270" height="128" rx="26" fill="url(#sarvam)" stroke="#D18600" stroke-width="2"/>
    <text x="515" y="987" text-anchor="middle" class="box-title-dark">Sarvam-30B</text>
    <text x="515" y="1018" text-anchor="middle" class="box-copy-dark">Writes the grounded answer,</text>
    <text x="515" y="1048" text-anchor="middle" class="box-copy-dark">snippets, and follow-ups</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="735" y="900" width="270" height="74" rx="22" fill="url(#sarvam)" stroke="#D18600" stroke-width="2"/>
    <text x="870" y="944" text-anchor="middle" class="box-title-dark">Mayura v1</text>
    <rect x="735" y="994" width="270" height="74" rx="22" fill="url(#sarvam)" stroke="#D18600" stroke-width="2"/>
    <text x="870" y="1038" text-anchor="middle" class="box-title-dark">Sarvam Transliteration API</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1090" y="940" width="270" height="128" rx="26" fill="url(#sarvam)" stroke="#D18600" stroke-width="2"/>
    <text x="1225" y="987" text-anchor="middle" class="box-title-dark">Bulbul v3</text>
    <text x="1225" y="1018" text-anchor="middle" class="box-copy-dark">Turns the final response</text>
    <text x="1225" y="1048" text-anchor="middle" class="box-copy-dark">into playable speech</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1445" y="940" width="285" height="128" rx="26" fill="url(#output)" stroke="#8FD5B5" stroke-width="2"/>
    <text x="1587.5" y="987" text-anchor="middle" class="box-title">Final Learner Output</text>
    <text x="1587.5" y="1018" text-anchor="middle" class="box-copy">Readable answer, citations,</text>
    <text x="1587.5" y="1048" text-anchor="middle" class="box-copy">follow-ups, and optional audio</text>
  </g>

  <path d="M300 344H350V468H380" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M300 488H870V720" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M300 632H350V720H380" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M650 532H735" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1005 532H1090" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1360 532H1445" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1587.5 596V676H870V720" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M650 784H735" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1005 784H1090" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1360 784H1445" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1587.5 848V900H515V940" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M650 1004H735" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1005 937H1046C1068 937 1090 955 1090 976" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1005 1031H1046C1068 1031 1090 1022 1090 1004" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M650 1004H700C718 1004 735 987 735 974" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1360 1004H1445" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="720" width="230" height="112" rx="24" fill="#FFFDF8" stroke="#E0CFAF" stroke-dasharray="8 8" stroke-width="2"/>
    <text x="185" y="766" text-anchor="middle" class="box-title">Text Question</text>
    <text x="185" y="798" text-anchor="middle" class="box-copy">Skips transcription and goes</text>
    <text x="185" y="828" text-anchor="middle" class="box-copy">straight into the question path</text>
  </g>
</svg>
