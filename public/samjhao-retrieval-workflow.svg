<svg width="1800" height="980" viewBox="0 0 1800 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1800" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9EF"/>
      <stop offset="1" stop-color="#FFF2DA"/>
    </linearGradient>
    <linearGradient id="peach" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF0CF"/>
      <stop offset="1" stop-color="#FFE0A1"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F6F1E7"/>
      <stop offset="1" stop-color="#EEE2D1"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DDF8EE"/>
      <stop offset="1" stop-color="#BFEED9"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#CCAA6A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#8A6E42"/>
    </marker>
    <style>
      .title { font: 700 40px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2E2415; }
      .subtitle { font: 500 21px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #68563A; }
      .section { font: 700 20px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #58462B; letter-spacing: 0.08em; }
      .box-title { font: 700 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2E2415; }
      .box-copy { font: 500 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5A4A30; }
      .example-title { font: 700 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2E2415; }
      .example-copy { font: 500 20px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4E402A; }
      .small { font: 600 17px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6D5A3B; }
    </style>
  </defs>

  <rect width="1800" height="980" rx="28" fill="url(#bg2)"/>
  <rect x="36" y="28" width="1728" height="924" rx="30" stroke="#E8D5B4" stroke-width="2"/>

  <text x="70" y="88" class="title">Samjhao Retrieval Workflow</text>
  <text x="70" y="124" class="subtitle">The retriever turns one learner question into a small set of grounded chunks before the tutor model writes the final answer.</text>

  <text x="70" y="210" class="section">QUESTION UNDERSTANDING</text>
  <text x="70" y="482" class="section">SEARCH + MERGE</text>
  <text x="70" y="754" class="section">RERANK + GROUNDING</text>

  <g filter="url(#shadow2)">
    <rect x="70" y="236" width="280" height="126" rx="26" fill="url(#paper)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="210" y="283" text-anchor="middle" class="box-title">Learner Question</text>
    <text x="210" y="314" text-anchor="middle" class="box-copy">Example: "gravity ko simple</text>
    <text x="210" y="344" text-anchor="middle" class="box-copy">words me samjhao"</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="420" y="236" width="280" height="126" rx="26" fill="url(#peach)" stroke="#E0A841" stroke-width="2"/>
    <text x="560" y="283" text-anchor="middle" class="box-title">Build Retrieval Plan</text>
    <text x="560" y="314" text-anchor="middle" class="box-copy">Classify question type and</text>
    <text x="560" y="344" text-anchor="middle" class="box-copy">identify focus terms</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="770" y="236" width="300" height="126" rx="26" fill="url(#peach)" stroke="#E0A841" stroke-width="2"/>
    <text x="920" y="283" text-anchor="middle" class="box-title">Generate Query Variants</text>
    <text x="920" y="314" text-anchor="middle" class="box-copy">Original query, focus phrase,</text>
    <text x="920" y="344" text-anchor="middle" class="box-copy">and concept-style rewrites</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1140" y="236" width="250" height="126" rx="26" fill="url(#paper)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="1265" y="283" text-anchor="middle" class="box-title">Active Source</text>
    <text x="1265" y="314" text-anchor="middle" class="box-copy">Only search the chunks tied</text>
    <text x="1265" y="344" text-anchor="middle" class="box-copy">to the selected document</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1460" y="236" width="270" height="126" rx="26" fill="url(#paper)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="1595" y="283" text-anchor="middle" class="box-title">Contextualized Chunks</text>
    <text x="1595" y="314" text-anchor="middle" class="box-copy">Search over cleaned chunk text</text>
    <text x="1595" y="344" text-anchor="middle" class="box-copy">plus added section context</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="250" y="510" width="350" height="144" rx="28" fill="url(#paper)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="425" y="560" text-anchor="middle" class="box-title">Text Search Branch</text>
    <text x="425" y="594" text-anchor="middle" class="box-copy">BM25 + lexical matching over</text>
    <text x="425" y="624" text-anchor="middle" class="box-copy">section, content, context, summary</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="720" y="510" width="360" height="144" rx="28" fill="url(#paper)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="900" y="560" text-anchor="middle" class="box-title">Vector Search Branch</text>
    <text x="900" y="594" text-anchor="middle" class="box-copy">Optional query embeddings + cosine</text>
    <text x="900" y="624" text-anchor="middle" class="box-copy">similarity against stored chunk vectors</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1200" y="510" width="300" height="144" rx="28" fill="url(#paper)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="1350" y="560" text-anchor="middle" class="box-title">Merge Candidates</text>
    <text x="1350" y="594" text-anchor="middle" class="box-copy">Combine lexical and semantic hits</text>
    <text x="1350" y="624" text-anchor="middle" class="box-copy">into one scored candidate set</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1620" y="510" width="110" height="144" rx="28" fill="url(#mint)" stroke="#8FD5B5" stroke-width="2"/>
    <text x="1675" y="575" text-anchor="middle" class="box-title">Top</text>
    <text x="1675" y="610" text-anchor="middle" class="box-title">Set</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="250" y="782" width="380" height="144" rx="28" fill="url(#peach)" stroke="#E0A841" stroke-width="2"/>
    <text x="440" y="832" text-anchor="middle" class="box-title">Custom Reranker</text>
    <text x="440" y="866" text-anchor="middle" class="box-copy">Boost section matches and definition-style</text>
    <text x="440" y="896" text-anchor="middle" class="box-copy">evidence while suppressing noisy chunks</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="760" y="782" width="360" height="144" rx="28" fill="url(#paper)" stroke="#D7C3A0" stroke-width="2"/>
    <text x="940" y="832" text-anchor="middle" class="box-title">Diversity Selection</text>
    <text x="940" y="866" text-anchor="middle" class="box-copy">Drop near-duplicates and keep a small</text>
    <text x="940" y="896" text-anchor="middle" class="box-copy">set of chunks with different evidence</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1250" y="782" width="300" height="144" rx="28" fill="url(#mint)" stroke="#8FD5B5" stroke-width="2"/>
    <text x="1400" y="832" text-anchor="middle" class="box-title">Grounded Context</text>
    <text x="1400" y="866" text-anchor="middle" class="box-copy">Top chunks become the context</text>
    <text x="1400" y="896" text-anchor="middle" class="box-copy">fed into the tutor model</text>
  </g>

  <path d="M350 299H420" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M700 299H770" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M1070 299H1140" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M1390 299H1460" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>

  <path d="M920 362V450H425V510" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M920 362V450H900V510" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M1595 362V450H425V510" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M1595 362V450H900V510" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>

  <path d="M600 582H720" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M1080 582H1200" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M1500 582H1620" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>

  <path d="M1675 654V722H440V782" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M630 854H760" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M1120 854H1250" stroke="#8A6E42" stroke-width="4" marker-end="url(#arrow2)"/>
</svg>
